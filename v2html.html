<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
    
    <title>MGRS Otomatik Konumlu Filigran Şablonu</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.11.0/proj4.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mgrs@1.0.0/dist/mgrs.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 15px;
            background-color: #1e1e24;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-height: 100vh;
            box-sizing: border-box;
            color: #fff;
        }

        @media (min-width: 768px) {
            body { flex-direction: row; padding: 20px; }
        }

        .control-panel {
            flex: 1;
            width: 100%;
            max-width: 100%;
            background-color: #2a2a35;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            gap: 15px;
            height: fit-content;
            border: 1px solid #3a3a4a;
            box-sizing: border-box;
        }

        @media (min-width: 768px) { .control-panel { max-width: 320px; } }

        .control-panel h3 {
            margin-top: 0;
            color: #fff;
            border-bottom: 2px solid #3a3a4a;
            padding-bottom: 10px;
            font-size: 1.1rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .input-group label {
            font-size: 13px;
            font-weight: 600;
            color: #aaa;
        }

        .input-group-row {
            display: flex;
            gap: 8px;
        }

        .input-group input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 1px solid #4a4a5a;
            border-radius: 6px;
            font-size: 14px;
            background-color: #1e1e24;
            color: #fff;
            outline: none;
        }

        /* Konum Çekme Butonu */
        .gps-btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 0 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: background 0.2s;
        }
        .gps-btn:hover { background-color: #0056b3; }

        .input-group input[type="file"] {
            padding: 5px 0;
            color: #ccc;
            font-size: 14px;
        }

        .download-btn {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 12px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 5px;
            display: none;
            width: 100%;
        }
        .download-btn:hover { background-color: #218838; }

        .preview-area {
            flex: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #111;
            border-radius: 12px;
            padding: 5px;
            border: 1px solid #3a3a4a;
            overflow: hidden;
            width: 100%;
            box-sizing: border-box;
        }

        .template-container {
            position: relative;
            display: inline-block; 
            max-width: 100%;
            background-color: #000;
            overflow: hidden;
            margin: 0 auto;
        }

        .watermark-box {
            position: absolute;
            background-color: #ffffff !important;
            padding: 2px 6px;
            font-weight: bold;
            font-size: 4vw; 
            font-family: Arial, Helvetica, sans-serif;
            color: #000000 !important; 
            text-decoration: none !important; 
            z-index: 10;
            letter-spacing: 0.3px;
            white-space: nowrap;
            pointer-events: none;
            line-height: 1.1;
        }

        .watermark-box * {
            color: #000000 !important;
            text-decoration: none !important;
        }

        @media (min-width: 768px) {
            .watermark-box { font-size: 20px; padding: 3px 10px; }
        }

        .top-left { top: 0; left: 0; }
        .top-right { top: 0; right: 0; }
        .bottom-left { bottom: 0; left: 0; }

        .main-image {
            max-width: 100%;
            height: auto;
            max-height: 65vh; 
            display: block;
            object-fit: contain;
            margin: 0;
            padding: 0;
        }

        @media (min-width: 768px) { .main-image { max-height: 80vh; } }

        .no-image-placeholder {
            padding: 40px 20px;
            text-align: center;
            color: #666;
            font-style: italic;
            border: 2px dashed #444;
            border-radius: 8px;
            width: 100%;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="control-panel">
        <h3>Filigran Paneli</h3>
        
        <div class="input-group">
            <label for="input-date">Tarih / Kod (Sol Üst)</label>
            <input type="text" id="input-date" value="020830C TEM 2026">
        </div>

        <div class="input-group">
            <label for="input-name">İsim (Sağ Üst)</label>
            <input type="text" id="input-name" value="SARKE">
        </div>

        <div class="input-group">
            <label for="input-coord">Koordinat (Sol Alt)</label>
            <div class="input-group-row">
                <input type="text" id="input-coord" value="38SLG 96681 08362">
                <button id="gps-btn" class="gps-btn" type="button">📍 Çek</button>
            </div>
        </div>

        <div class="input-group">
            <label for="image-upload">Fotoğraf Yükle</label>
            <input type="file" id="image-upload" accept="image/*">
        </div>

        <button id="download-btn" class="download-btn">Görseli Filigranlı İndir</button>
    </div>

    <div class="preview-area">
        <div id="placeholder-box" class="no-image-placeholder">
            Lütfen sol panelden bir fotoğraf yükleyin...
        </div>

        <div id="template-wrapper" class="template-container" style="display: none;">
            <div class="watermark-box top-left" id="view-date">020830C TEM 2026</div>
            <div class="watermark-box top-right" id="view-name">SARKE</div>
            <div class="watermark-box bottom-left" id="view-coord">38SLG 96681 08362</div>

            <img id="preview-img" class="main-image" src="" alt="Önizleme">
        </div>
    </div>

    <script>
        const inputDate = document.getElementById('input-date');
        const inputName = document.getElementById('input-name');
        const inputCoord = document.getElementById('input-coord');
        const imageUpload = document.getElementById('image-upload');
        const downloadBtn = document.getElementById('download-btn');
        const gpsBtn = document.getElementById('gps-btn');

        const viewDate = document.getElementById('view-date');
        const viewName = document.getElementById('view-name');
        const viewCoord = document.getElementById('view-coord');
        
        const placeholderBox = document.getElementById('placeholder-box');
        const templateWrapper = document.getElementById('template-wrapper');
        const previewImg = document.getElementById('preview-img');

        inputDate.addEventListener('input', () => { viewDate.textContent = inputDate.value; });
        inputName.addEventListener('input', () => { viewName.textContent = inputName.value; });
        inputCoord.addEventListener('input', () => { viewCoord.textContent = inputCoord.value; });

        // OTOMATİK MGRS KONUM ÇEKME FONKSİYONU
        gpsBtn.addEventListener('click', () => {
            if (!navigator.geolocation) {
                alert("Tarayıcınız konum özelliğini desteklemiyor.");
                return;
            }
            
            gpsBtn.textContent = "⌛...";
            
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    
                    try {
                        // Kütüphaneyi kullanarak enlem/boylamı MGRS'e çeviriyoruz
                        let mgrsCoord = mgrs.forward([lng, lat]); 
                        
                        // Örnek: "38SLG9668108362" çıktısını "38SLG 96681 08362" formatına getiriyoruz
                        let zone = mgrsCoord.substring(0, 5); // "38SLG"
                        let easting = mgrsCoord.substring(5, 10); // "96681"
                        let northing = mgrsCoord.substring(10, 15); // "08362"
                        
                        let formattedMGRS = `${zone} ${easting} ${northing}`;
                        
                        // Ekranı güncelle
                        inputCoord.value = formattedMGRS;
                        viewCoord.textContent = formattedMGRS;
                        gpsBtn.textContent = "📍 Çek";
                    } catch (error) {
                        alert("Koordinat dönüşümünde bir hata oluştu.");
                        gpsBtn.textContent = "📍 Çek";
                    }
                },
                (error) => {
                    alert("Konum alınamadı. Lütfen cihazınızın konum (GPS) servisinin açık olduğundan ve tarayıcıya izin verdiğinizden emin olun.");
                    gpsBtn.textContent = "📍 Çek";
                },
                { enableHighAccuracy: true, timeout: 10000 } // Yüksek doğruluk modu aktif
            );
        });

        imageUpload.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.addEventListener('load', function() {
                    previewImg.setAttribute('src', this.result);
                    placeholderBox.style.display = 'none';
                    templateWrapper.style.display = 'inline-block';
                    downloadBtn.style.display = 'block';
                });
                reader.readAsDataURL(file);
            }
        });

        downloadBtn.addEventListener('click', () => {
            window.scrollTo(0,0);
            html2canvas(templateWrapper, {
                useCORS: true,
                allowTaint: true,
                scale: window.devicePixelRatio || 2,
                logging: false,
                backgroundColor: null,
                scrollX: 0,
                scrollY: 0,
                width: templateWrapper.getBoundingClientRect().width,
                height: templateWrapper.getBoundingClientRect().height
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'filigranli_gorsel.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        });
    </script>

</body>
</html>
