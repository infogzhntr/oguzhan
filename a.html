<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
    
    <title>KOTAF - HAVA</title>
    
    <!-- Ekran görüntüsü almak için temel kütüphane -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <!-- DÜNYA STANDARDI GÜVENLİ MGRS ENGINE -->
    <script>

    </script>

    <style>
        /* --- ARKA PLAN VE YÜKLEME EKRANI --- */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #111116; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.4s, visibility 0.4s;
        }
        .loader-radar {
            width: 65px; height: 65px; border: 3px solid rgba(0, 123, 255, 0.1); border-radius: 50%;
            border-top-color: #007bff; border-bottom-color: #007bff; animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        #login-panel {
            display: none; flex-direction: column; align-items: center; gap: 12px; background: #2a2a35;
            padding: 25px; border-radius: 10px; border: 1px solid #3a3a4a; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 260px;
        }
        .password-input {
            width: 100%; padding: 10px; border: 1px solid #4a4a5a; border-radius: 5px; font-size: 16px;
            background-color: #1e1e24; color: #fff; text-align: center; box-sizing: border-box; letter-spacing: 5px;
        }
        .login-btn { width: 100%; background-color: #007bff; color: white; border: none; padding: 10px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .error-message { color: #dc3545; font-size: 12px; font-weight: bold; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .fade-out { opacity: 0; visibility: hidden; pointer-events: none; }

        /* --- ANA TASARIM --- */
        body {
            margin: 0; padding: 15px; background-color: #1e1e24; font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; gap: 15px; min-height: 100vh; box-sizing: border-box; color: #fff;
        }
        @media (min-width: 768px) { body { flex-direction: row; padding: 20px; } }
        
        .control-panel {
            flex: 1; width: 100%; max-width: 100%; background-color: #2a2a35; padding: 20px; border-radius: 12px;
            display: flex; flex-direction: column; gap: 12px; height: fit-content; border: 1px solid #3a3a4a; box-sizing: border-box;
        }
        @media (min-width: 768px) { .control-panel { max-width: 320px; } }
        .control-panel h3 { margin: 0 0 5px 0; color: #fff; border-bottom: 2px solid #3a3a4a; padding-bottom: 8px; font-size: 1rem; }
        
        .input-group { display: flex; flex-direction: column; gap: 4px; }
        .input-group label { font-size: 12px; font-weight: 600; color: #aaa; }
        .input-group-row { display: flex; gap: 6px; }
        .input-group input[type="text"] {
            flex: 1; padding: 8px 10px; border: 1px solid #4a4a5a; border-radius: 6px;
            font-size: 13px; background-color: #1e1e24; color: #fff; outline: none;
        }
        
        .auto-btn {
            background-color: #007bff; color: white; border: none; padding: 0 10px; border-radius: 6px;
            cursor: pointer; font-weight: bold; font-size: 12px; display: flex; align-items: center; justify-content: center;
        }
        .full-gps-btn {
            background-color: #ffc107; color: #000; border: none; padding: 12px; font-size: 14px;
            font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 5px;
            display: flex; align-items: center; justify-content: center; gap: 8px; transition: background-color 0.2s;
        }
        .full-gps-btn:disabled { background-color: #4a4a5a; color: #aaa; cursor: not-allowed; }
        
        .toggle-logo-btn {
            background-color: #4a4a5a; color: white; border: none; padding: 10px; font-size: 13px;
            font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%;
        }
        .toggle-logo-btn.active { background-color: #ffc107; color: #000; }
        .download-btn {
            background-color: #28a745; color: white; border: none; padding: 12px; font-size: 14px;
            font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; display: none; margin-top: 5px;
        }

        /* --- ŞABLON ÖNİZLEME --- */
        .preview-area {
            flex: 2; display: flex; justify-content: center; align-items: center; background-color: #111;
            border-radius: 12px; padding: 5px; border: 1px solid #3a3a4a; overflow: hidden; width: 100%; box-sizing: border-box;
        }
        .template-container { position: relative; display: inline-block; max-width: 100%; background-color: #000; overflow: hidden; margin: 0 auto; }
        
        .watermark-box {
            position: absolute; background-color: #ffffff !important; padding: 2px 6px; font-weight: bold;
            font-size: 3.8vw; font-family: Arial, sans-serif; color: #000000 !important; z-index: 10;
            white-space: nowrap; pointer-events: none; line-height: 1.1; letter-spacing: -0.2px;
        }
        .watermark-box * { color: #000000 !important; }
        .top-left { top: 0; left: 0; }
        .top-right { top: 0; right: 0; }
        .bottom-left { bottom: 0; left: 0; }
        .bottom-right { bottom: 0; right: 0; }
        
        .watermark-logo-box { position: absolute; bottom: 6.2vw; right: 0; z-index: 10; pointer-events: none; display: none; padding: 3px; }
        .watermark-logo-box img { height: 11vw; max-height: 55px; width: auto; display: block; object-fit: contain; }

        @media (min-width: 768px) {
            .watermark-box { font-size: 18px; padding: 3px 8px; }
            .watermark-logo-box { bottom: 30px; } 
            .watermark-logo-box img { height: 55px; }
        }
        .main-image { max-width: 100%; height: auto; max-height: 65vh; display: block; object-fit: contain; }
        @media (min-width: 768px) { .main-image { max-height: 78vh; } }
        .no-image-placeholder { padding: 40px 20px; text-align: center; color: #666; font-style: italic; border: 2px dashed #444; border-radius: 8px; width: 100%; }
    </style>
</head>
<body>

    <!-- GİRİŞ EKRANI -->
    <div id="splash-screen">
        <div id="loader-content">
            <div class="loader-radar"></div>
        </div>
        <div id="login-panel">
            <h4 style="margin:0 0 5px 0; color:#fff; font-size:14px;">KOTAF GİRİŞ</h4>
            <input type="password" id="password-field" class="password-input" placeholder="••••" maxlength="6">
            <div id="error-msg" class="error-message">ŞİFRE HATALI!</div>
            <button id="login-submit" class="login-btn">GİRİŞ YAP</button>
        </div>
    </div>

    <!-- AYARLAR PANELİ -->
    <div class="control-panel">
        <h3>KOTAF Kontrol Paneli</h3>
        
        <div class="input-group">
            <label>Tarih / Kod (Sol Üst)</label>
            <div class="input-group-row">
                <input type="text" id="input-date" value="020830C TEM 2026">
                <button id="time-btn" class="auto-btn" type="button">⏱️ Çek</button>
            </div>
        </div>

        <div class="input-group">
            <label>İsim (Sağ Üst)</label>
            <input type="text" id="input-name" value="SARKE">
        </div>

        <!-- TEK TUŞLU KONUM SİSTEMİ -->
        <button id="full-gps-btn" class="full-gps-btn" type="button">🛰️ KONUMDAN TÜM VERİLERİ ÇEK</button>

        <div class="input-group" style="margin-top: 5px;">
            <label>Koordinat (Sol Alt)</label>
            <input type="text" id="input-coord" value="MGRS HATA">
        </div>

        <div class="input-group">
            <label>Rakım / Hava Durumu (Sağ Alt)</label>
            <input type="text" id="input-weather" value="H: N/A | Hava Durumu Alınamadı">
        </div>

        <div class="input-group">
            <label>Faaliyet Fotoğrafı Yükle</label>
            <input type="file" id="image-upload" accept="image/*">
        </div>

        <div class="input-group" style="border-top:1px solid #3a3a4a; padding-top:10px;">
            <button id="toggle-logo-btn" class="toggle-logo-btn" type="button">🔲 Logo Ekle: PASİF</button>
        </div>

        <button id="download-btn" class="download-btn">Görseli Filigranlı İndir</button>
    </div>

    <!-- GÖRSEL ÖNİZLEME -->
    <div class="preview-area">
        <div id="placeholder-box" class="no-image-placeholder">
            Lütfen sol panelden bir faaliyet fotoğrafı yükleyin...
        </div>
        <div id="template-wrapper" class="template-container" style="display: none;">
            <div class="watermark-box top-left" id="view-date">020830C TEM 2026</div>
            <div class="watermark-box top-right" id="view-name">SARKE</div>
            <div class="watermark-box bottom-left" id="view-coord">MGRS HATA</div>
            <div class="watermark-box bottom-right" id="view-weather">H: N/A | Hava Durumu Alınamadı</div>
            <div class="watermark-logo-box" id="logo-wrapper">
                <img id="view-logo" src="" alt="Arma">
            </div>
            <img id="preview-img" class="main-image" src="" alt="Önizleme">
        </div>
    </div>

    <script>
        const DOGRU_SIFRE = "1234"; 
        const SABIT_LOGO_URL = "https://i.hizliresim.com/8q5y1lk.png";

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.getElementById('loader-content').style.display = 'none';
                document.getElementById('login-panel').style.display = 'flex';
                document.getElementById('password-field').focus(); 
            }, 1000); 
            document.getElementById('view-logo').setAttribute('src', SABIT_LOGO_URL);
        });

        const passwordField = document.getElementById('password-field');
        const loginSubmit = document.getElementById('login-submit');
        const errorMsg = document.getElementById('error-msg');
        const splashScreen = document.getElementById('splash-screen');

        function statusLogin() {
            if (passwordField.value === DOGRU_SIFRE) { splashScreen.classList.add('fade-out'); } 
            else { errorMsg.style.display = 'block'; passwordField.value = ''; }
        }
        loginSubmit.addEventListener('click', statusLogin);
        passwordField.addEventListener('keypress', (e) => { if (e.key === 'Enter') statusLogin(); });

        const inputDate = document.getElementById('input-date');
        const inputName = document.getElementById('input-name');
        const inputCoord = document.getElementById('input-coord');
        const inputWeather = document.getElementById('input-weather'); 
        const imageUpload = document.getElementById('image-upload');
        const toggleLogoBtn = document.getElementById('toggle-logo-btn');
        const downloadBtn = document.getElementById('download-btn');
        const fullGpsBtn = document.getElementById('full-gps-btn');
        const timeBtn = document.getElementById('time-btn');

        const viewDate = document.getElementById('view-date');
        const viewName = document.getElementById('view-name');
        const viewCoord = document.getElementById('view-coord');
        const viewWeather = document.getElementById('view-weather'); 
        const logoWrapper = document.getElementById('logo-wrapper'); 
        const placeholderBox = document.getElementById('placeholder-box');
        const templateWrapper = document.getElementById('template-wrapper');
        const previewImg = document.getElementById('preview-img');

        inputDate.addEventListener('input', () => { viewDate.textContent = inputDate.value; });
        inputName.addEventListener('input', () => { viewName.textContent = inputName.value; });
        inputCoord.addEventListener('input', () => { viewCoord.textContent = inputCoord.value; });
        inputWeather.addEventListener('input', () => { viewWeather.textContent = inputWeather.value; }); 

        let logoAktifMi = false;
        toggleLogoBtn.addEventListener('click', () => {
            logoAktifMi = !logoAktifMi;
            if (logoAktifMi) {
                toggleLogoBtn.textContent = "✅ Logo Ekle: AKTİF";
                toggleLogoBtn.classList.add('active');
                logoWrapper.style.display = 'block';
            } else {
                toggleLogoBtn.textContent = "🔲 Logo Ekle: PASİF";
                toggleLogoBtn.classList.remove('active');
                logoWrapper.style.display = 'none';
            }
        });

        // ASKERİ TARİH SİSTEMİ
        timeBtn.addEventListener('click', () => {
            const simdi = new Date();
            const gun = String(simdi.getDate()).padStart(2, '0');
            const saat = String(simdi.getHours()).padStart(2, '0');
            const dakika = String(simdi.getMinutes()).padStart(2, '0');
            const aylar = ["OCA", "SUB", "MAR", "NIS", "MAY", "HAZ", "TEM", "AGU", "EYL", "EKM", "KAS", "ARA"];
            const formatliDTG = `${gun}${saat}${dakika}C ${aylar[simdi.getMonth()]} ${simdi.getFullYear()}`;
            inputDate.value = formatliDTG; viewDate.textContent = formatliDTG;
        });

        // MANUEL VEYA OTOMATİK GELEN KOORDİNATI MGRS & HAVA DURUMUNA ÇEVİREN ANA MOTOR
        function processCoordinates(lat, lng) {
            // 1. MGRS Hesaplama
            try {
                const mgrsSonuc = mgrs.forward([parseFloat(lng), parseFloat(lat)], 5);
                let z = mgrsSonuc.substring(0, 5); 
                let e = mgrsSonuc.substring(5, 10); 
                let n = mgrsSonuc.substring(10, 15); 
                const duzgunMgrs = `${z} ${e} ${n}`;
                inputCoord.value = duzgunMgrs;
                viewCoord.textContent = duzgunMgrs;
            } catch(e) {
                inputCoord.value = "HESAPLAMA HATASI";
                viewCoord.textContent = "HESAPLAMA HATASI";
            }

            // 2. Hava Durumu API Sorgusu
            fullGpsBtn.textContent = "⌛ HAVA DURUMU ALINIYOR...";
            fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,weather_code&elevation=true`)
            .then(res => res.json())
            .then(data => {
                const r = Math.round(data.elevation || 0);
                const d = Math.round(data.current.temperature_2m);
                const c = data.current.weather_code;
                let st = "AÇIK";
                if (c >= 1 && c <= 3) st = "AZ BULUTLU";
                else if (c >= 45 && c <= 48) st = "SİSLİ";
                else if (c >= 51 && c <= 67) st = "YAĞIŞLI";
                else if (c >= 71 && c <= 77) st = "KARLI";
                
                const havaSonuc = `H: ${r}m | ${d}°C ${st}`;
                inputWeather.value = havaSonuc;
                viewWeather.textContent = havaSonuc;
            })
            .catch(() => {
                inputWeather.value = "H: N/A | Hava Durumu Alınamadı";
                viewWeather.textContent = "H: N/A | Hava Durumu Alınamadı";
            })
            .finally(() => {
                fullGpsBtn.disabled = false;
                fullGpsBtn.textContent = "🛰️ KONUMDAN TÜM VERİLERİ ÇEK";
            });
        }

        // BUTON TETİKLEME
        fullGpsBtn.addEventListener('click', () => {
            fullGpsBtn.disabled = true;
            fullGpsBtn.textContent = "⌛ KONUM ALINIYOR...";

            if (!navigator.geolocation) {
                handleFallback("Tarayıcınız otomatik konum bulmayı desteklemiyor.");
                return;
            }

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    processCoordinates(lat, lng);
                },
                (error) => {
                    // Tarayıcı engellendiğinde veya gizli modda hata alındığında devreye giren yedek mekanizma
                    handleFallback("Tarayıcı konum izni engellenmiş veya Gizli Mod kısıtlaması var.");
                },
                { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 }
            );
        });

        // GEOLOCATION BAŞARISIZ OLURSA MANUEL PANEL AÇMA SİSTEMİ
        function handleFallback(sebepMesaji) {
            const koordinatInput = prompt(`${sebepMesaji}\n\nLütfen bulunduğunuz yerin veya faaliyetin Enlem, Boylam değerlerini aralarında virgül olacak şekilde girin:\n(Örn: 39.9251, 32.8369)`);
            
            if (koordinatInput && koordinatInput.includes(",")) {
                const parts = koordinatInput.split(",");
                const lat = parseFloat(parts[0].trim());
                const lng = parseFloat(parts[1].trim());
                
                if (!isNaN(lat) && !isNaN(lng)) {
                    processCoordinates(lat, lng);
                } else {
                    alert("Geçersiz koordinat formatı.");
                    resetGpsButton();
                }
            } else {
                alert("Koordinat girilmedi. İşlem iptal edildi.");
                resetGpsButton();
            }
        }

        function resetGpsButton() {
            fullGpsBtn.disabled = false;
            fullGpsBtn.textContent = "🛰️ KONUMDAN TÜM VERİLERİ ÇEK";
        }

        imageUpload.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.addEventListener('load', function() {
                    previewImg.setAttribute('src', this.result);
                    placeholderBox.style.display = 'none';
                    templateWrapper.style.display = 'inline-block';
                    downloadBtn.style.display = 'block';
                });
                reader.readAsDataURL(file);
            }
        });

        downloadBtn.addEventListener('click', () => {
            window.scrollTo(0,0);
            html2canvas(templateWrapper, { scale: 2, logging: false, backgroundColor: null }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'kotaf_taktik_gorsel.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        });
    </script>
</body>
</html>
